name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build -c Release
      - name: Test
        run: dotnet test -c Release --no-build --logger "trx" --results-directory TestResults
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning
          $results | Format-Table RuleName, Severity, ScriptName, Line -AutoSize
          if ($results | Where-Object Severity -eq 'Error') {
            Write-Error "PSScriptAnalyzer found errors."
            exit 1
          }
      - name: Pester
        shell: pwsh
        run: |
          if (Test-Path tests/ps) {
            Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.5
            Invoke-Pester tests/ps -CI
          }
          else {
            Write-Host "No Pester tests yet (expected location: tests/ps)."
          }
